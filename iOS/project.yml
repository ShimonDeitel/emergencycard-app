name: Emergencycard
options:
  bundleIdPrefix: com.shimondeitel.emergencycard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Emergencycard:
    type: application
    platform: iOS
    sources:
      - path: Emergencycard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.emergencycard
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Emergencycard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  EmergencycardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EmergencycardTests
      - path: Emergencycard.storekit
    dependencies:
      - target: Emergencycard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.emergencycard.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  EmergencycardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: EmergencycardUITests
    dependencies:
      - target: Emergencycard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.emergencycard.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Emergencycard:
    build:
      targets:
        Emergencycard: all
        EmergencycardTests: [test]
        EmergencycardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Emergencycard.storekit
    test:
      config: Debug
      storeKitConfiguration: Emergencycard.storekit
      targets:
        - EmergencycardTests
        - EmergencycardUITests
    archive:
      config: Release
